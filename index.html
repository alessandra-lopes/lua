<!DOCTYME html>
<html lang="pt-br">
    <!--Configurações da página-->
    <head>
        <title>CSS</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="./css/style.css">
        <!--dica: escreve 'link', vai abrir o menu e eu clico em 'link:css'-->
    </head>
    <!--Conteúdo da página-->
    <body>
        <h1>Vermelho</h1>
        <!--determinando IDs para estilizar tags iguals de jeitos diferentes; 
        lá no css fica: #green e #blue-->
        <h2 id="green">Verde</h2> 
        <h2 id="blue">Azul</h2>

        <!--quando quero aplicar a mesma qualidade para TAGS diferentes
        uso "class" e não "id"-->
        <h3 class="colors">Eu estou na turma #2toTheMoon</h3>
        <h4 class="colors">Eu também!</h4>
    </body>
</html>
